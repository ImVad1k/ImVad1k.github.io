    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Web Audio API для звуков ---
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            let audioCtx;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playSound(type) {
                if (!audioCtx) return;
                
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if (type === 'hover-normal') {
                    // Плавный приятный звук (Sine wave)
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                } 
                else if (type === 'hover-hacker') {
                    // Резкий терминальный звук (Square wave)
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.02, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                }
                else if (type === 'hacker-on') {
                    // Звук включения (нарастающий гул)
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.4);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.4);
                }
                else if (type === 'hacker-off') {
                    // Звук выключения (затухающий гул)
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.4);
                }
            }

            // Инициализация звука по первому клику на страницу (политика браузеров)
            document.body.addEventListener('click', initAudio, { once: true });

            // Звуки при наведении на кнопки
            const buttons = document.querySelectorAll('.link-btn');
            buttons.forEach(btn => {
                btn.addEventListener('mouseenter', () => {
                    const isHacker = document.body.classList.contains('hacker-mode');
                    playSound(isHacker ? 'hover-hacker' : 'hover-normal');
                });
            });

            // --- Эффект печатной машинки ---
            const text = "Developer • Cybersec Student • Just a normal guy";
            const element = document.getElementById('typewriter');
            let i = 0;
            
            function typeWriter() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, Math.random() * 50 + 50);
                }
            }
            setTimeout(typeWriter, 500);

            // --- Матрица ---
            const canvas = document.getElementById('matrixBG');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%""\'#&_(),.;:?!\\|{}<>[]^~アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロゴゾドボポヴッン';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);
            
            function drawMatrix() {
                if (!document.body.classList.contains('hacker-mode')) return;
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0f0';
                ctx.font = fontSize + 'px monospace';
                for(let j = 0; j < drops.length; j++) {
                    const char = chars.charAt(Math.floor(Math.random() * chars.length));
                    ctx.fillText(char, j * fontSize, drops[j] * fontSize);
                    if(drops[j] * fontSize > canvas.height && Math.random() > 0.975) drops[j] = 0;
                    drops[j]++;
                }
            }
            setInterval(drawMatrix, 33);
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            // --- Пасхалка: 5 кликов по аватарке ---
            let clickCount = 0;
            const avatar = document.querySelector('.avatar');
            avatar.style.cursor = 'pointer';
            
            avatar.addEventListener('click', () => {
                initAudio();
                
                clickCount++;
                if (clickCount === 5) {
                    document.body.classList.toggle('hacker-mode');
                    const isHacker = document.body.classList.contains('hacker-mode');
                    
                    if (isHacker) {
                        playSound('hacker-on');
                        ctx.fillStyle = '#000';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    } else {
                        playSound('hacker-off');
                    }
                    clickCount = 0; // Сбрасываем счетчик
                }
            });
        });
    </script>
